# Live-demo workflow — @claude mention in PR/issue triggers Claude.
# Uses Anthropic's official action + the GitHub App you installed via
# `/install-github-app`. No API key in repo secrets — the app holds
# credentials on Anthropic's side.
#
# Trigger during session: comment "@claude review this diff" on any
# open PR. Job appears in Actions tab within ~10s.

name: claude (@mention)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          # The GitHub App installation supplies the auth. No API key needed.
          # If org later wants direct API billing instead, add:
          #   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowed-tools Read,Bash,Grep,Glob'
