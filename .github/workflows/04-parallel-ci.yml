# Module 04 — parallel review branch alongside test + lint.
# GHA parallelism model: separate `jobs:` w/ no `needs:` run concurrently.
# Total wall-clock = max(job duration), not sum. Same trick as Jenkins
# `parallel { }` — different syntax.

name: 04 · parallel CI (test + lint + claude review)

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "your normal test suite runs here (npm test / pytest / cargo test)"
      - run: sleep 15    # simulate a 15-s test suite

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "eslint / ruff / gofmt here"
      - run: sleep 8

  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }

      - name: Install Claude
        run: |
          sudo apt-get install -y -qq jq
          npm install -g @anthropic-ai/claude-code

      - name: Review diff
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        continue-on-error: true    # soft-fail during rollout
        run: |
          diff=$(git diff origin/${{ github.base_ref }}..HEAD -- '*.py' '*.ts' '*.tsx' '*.go' '*.js' 2>/dev/null || true)
          if [ -z "$diff" ]; then
            echo '{"findings":[],"note":"no code diff"}' > claude-review.json
            exit 0
          fi
          echo "$diff" | claude -p --output-format json \
            "Review this diff for logic bugs, off-by-one, missing null checks, unsafe patterns. Reply strict JSON: {\"findings\":[{\"file\":\"...\",\"severity\":\"low|med|high\",\"note\":\"...\"}]}" \
            | jq '.result | fromjson' > claude-review.json
          count=$(jq '.findings | length' claude-review.json)
          echo "Claude found $count findings"
          echo "findings=$count" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment findings on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('claude-review.json', 'utf-8'));
            if (!r.findings || r.findings.length === 0) return;
            const body = ['### 🤖 Claude review',
              ...r.findings.map(f => `- **${f.severity}** \`${f.file}\` — ${f.note}`)
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-review
          path: claude-review.json
